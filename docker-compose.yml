version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gira-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gira_db
      MYSQL_USER: gira_user
      MYSQL_PASSWORD: gira_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
